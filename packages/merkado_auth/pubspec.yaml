name: merkado_auth
description: "Shared authentication package for all Grascope/Merkado OS apps. Handles login, signup, OTP, onboarding, social login, cross-app SSO, and session lifecycle."
version: 0.0.1
homepage:
resolution: workspace
publish_to: none

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  common_utils2: 1.0.1
    # path: ../../../packages/common_utils
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  dio: ^5.9.1
  go_router: ^17.1.0
  local_auth: ^3.0.0
  equatable: ^2.0.8
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  freezed: ^3.2.5
  injectable_generator: ^2.12.0
  mockito: ^5.6.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
