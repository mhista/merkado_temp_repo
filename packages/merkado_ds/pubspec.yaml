name: merkado_ds
description: "A new Flutter package project."
version: 0.0.1
homepage:
resolution: workspace
publish_to: none

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  common_designs: ^1.1.5
    # path: ../../../packages/common_designs
  hugeicons: ^1.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  fonts:
    # ── Shared UI + MyCut primary ──
    - family: Inter
      fonts:
        - asset: fonts/Inter-VariableFont_opsz,wght.ttf
    # ── MyCut mono ──
    - family: DM Mono
      fonts:
        - asset: fonts/DMMono-Regular.ttf
          weight: 400
        - asset: fonts/DMMono-Medium.ttf
          weight: 500
    # ── Haulway primary ──
    - family: DM Sans
      fonts:
        - asset: fonts/DMSans-VariableFont_opsz,wght.ttf
    # ── Driply primary + Haulway display ──
    - family: Outfit
      fonts:
        - asset: fonts/Outfit-VariableFont_wght.ttf
    # ── FeastFeed primary ──
    - family: Manrope
      fonts:
        - asset: fonts/Manrope-VariableFont_wght.ttf
    # ── FeastFeed display ──
    - family: Lobster
      fonts:
        - asset: fonts/Lobster-Regular.ttf
          weight: 400
    # ── Driply premium ──
    - family: EB Garamond
      fonts:
        - asset: fonts/EBGaramond-Regular.ttf
          weight: 400
        - asset: fonts/EBGaramond-SemiBold.ttf
          weight: 600
    - family: CormorantGaramond
      fonts:
        - asset: fonts/CormorantGaramond-Italic-VariableFont_wght.ttf
        - asset: fonts/CormorantGaramond-VariableFont_wght.ttf
    - family: InstrumentSans
      fonts:
        - asset: fonts/InstrumentSans-VariableFont_wdth,wght.ttf